<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>귀여운 그림들</title>

<style>
html,body{
    width:100%;
    height:100%;
    margin:0;
}

body{
    font-family:"Arial",sans-serif;
    text-align:center;
    background:#fff8fc;
    padding-top:30px;
    box-sizing:border-box;
    overflow-x:hidden;
}

/* 화면 전체 무지개 테두리 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    padding:12px;

    background:violet;

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;

    pointer-events:none;
    z-index:9999;
}

    background-size:400% 400%;
    animation:borderMove 6s linear infinite;

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;

    pointer-events:none;
    z-index:9999;
}

@keyframes borderMove{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

/* 귀여운 제목 */
.title{
    font-size:60px;
    font-weight:bold;
    margin-bottom:20px;
    color:#ff1493;

    text-shadow:
        3px 3px 0 white,
        0 0 15px pink,
        0 0 30px hotpink;

    animation:
        bounce 1s infinite,
        colorChange 4s linear infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes colorChange{
    0%{color:#ff1493;}
    25%{color:#ff6600;}
    50%{color:#00cc66;}
    75%{color:#0099ff;}
    100%{color:#ff1493;}
}

h2{
    color:#444;
}

button{
    padding:10px 22px;
    margin:5px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:#ffb6d9;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff69b4;
    transform:scale(1.1);
}

img{
    display:none;
    max-width:400px;
    max-height:400px;
    margin-top:20px;
    border:4px solid pink;
    border-radius:20px;
    box-shadow:0 0 20px pink;
}

/* 하단 글자 */
h1{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    margin:0;

    font-size:72px;
    font-weight:bold;

    background:
       
       violet
     ;

   
}

@keyframes rainbow{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

@keyframes sparkle{
    0%,100%{
        transform:translateX(-50%) scale(1);
    }
    50%{
        transform:translateX(-50%) scale(1.08);
    }
}
</style>
</head>

<body>

<div class="title">
🐰🌸 귀여운 그림들 🌸🐰
</div>

<h2>이미지 보기</h2>

<button onclick="showImage(0)">😊 해피</button>
<button onclick="showImage(1)">🍔 헝그리</button>
<button onclick="showImage(2)">🐷 통통</button>
<button onclick="showImage(3)">🎉 야호</button>
<button onclick="showImage(4)">🐰 토끼</button>

<br><br>

<button onclick="hideImage()">❌ 사진 지우기</button>

<br>

<img id="photo">

<h1>K J S</h1>

<script>
const images=[
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%95%B4%ED%94%BC.png",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%97%9D%EA%B7%B8%EB%A6%AC.gif",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%86%B5%ED%86%B5.gif",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%EC%95%BC%ED%98%B8.png",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%86%A0%EB%81%BC.gif"
];

function showImage(index){
    const img=document.getElementById("photo");
    img.src=images[index];
    img.style.display="inline-block";
}

function hideImage(){
    const img=document.getElementById("photo");
    img.style.display="none";
    img.src="";
}
</script>

</body>
</html>
