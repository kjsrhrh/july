<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>귀여운 그림들</title>

<style>
html,body{
    width:100%;
    height:100%;
    margin:0;
}

body{
    font-family:"Arial",sans-serif;
    text-align:center;
    background:#fff8fc;
    padding-top:30px;
    box-sizing:border-box;
    overflow-x:hidden;
}

/* 제목 */
.title{
    font-size:60px;
    font-weight:bold;
    margin-bottom:20px;
    color:#ff1493;
    text-shadow:3px 3px 0 white, 0 0 15px pink;
}

/* 버튼 */
button{
    padding:10px 22px;
    margin:5px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:#ffb6d9;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff69b4;
    transform:scale(1.1);
}

/* 이미지 */
img{
    width:400px;
    height:400px;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    
    border:4px solid pink;
    border-radius:20px;
    box-shadow:0 0 20px pink;
}
/* 이름 */
h1{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    margin:0;
    font-size:72px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="title">
🐰🌸 귀여운 그림들 🌸🐰
</div>

<h2>이미지 보기</h2>

<!-- 이미지 (초기 귀여운 고양이) -->
<img id="photo" 
src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?auto=format&fit=crop&w=600&q=80">
<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>br><br><br>br><br><br>br><br><br>br><br><br>br><br><br>
<!-- 버튼 (KJS 바로 위) -->
<div style="margin-top:25px;">
    <button onclick="showImage(0)">😊 해피</button>
    <button onclick="showImage(1)">🍔 헝그리</button>
    <button onclick="showImage(2)">🐷 통통</button>
    <button onclick="showImage(3)">🎉 야호</button>
    <button onclick="showImage(4)">🐰 토끼</button>

    <br><br>

    <button onclick="hideImage()">❌ 사진 지우기</button>
</div>

<h1>K J S</h1>

<script>
const images=[
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%95%B4%ED%94%BC.png",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%97%9D%EA%B7%B8%EB%A6%AC.gif",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%86%B5%ED%86%B5.gif",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%EC%95%BC%ED%98%B8.png",
"https://raw.githubusercontent.com/kjsrhrh/ax/main/%ED%86%A0%EB%81%BC.gif"
];

function showImage(index){
    const img=document.getElementById("photo");
    img.style.display="block";
    img.src=images[index];
}

function hideImage(){
    const img=document.getElementById("photo");
    img.style.display="none";
    img.src="";
}
</script>

</body>
</html>
